<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="江苏美食打卡地图 - 收录江苏13个地级市特色美食，涵盖100+区县地道风味，包含美食故事与推荐店铺">
    <title>江苏美食打卡地图 - 品味水韵江苏</title>
    <style>
/* ==================== 全局样式 ==================== */
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background-color: #faf8f5;
    color: #333;
    line-height: 1.8;
    font-size: 16px;
    letter-spacing: 0.02em;
}
/* 选中文本颜色 */
::selection { background: #c41e3a33; color: #8B4513; }
::-moz-selection { background: #c41e3a33; color: #8B4513; }
@font-face {
    font-family: 'MaShanZheng';
    src: url('https://fonts.gstatic.com/s/mszenfont/v1/MaShanZheng-Regular.ttf') format('truetype');
}

/* ==================== 滚动条美化 ==================== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #f5efe8; border-radius: 4px; }
::-webkit-scrollbar-thumb { background: #c9a882; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #8B4513; }
* { scrollbar-width: thin; scrollbar-color: #c9a882 #f5efe8; }

/* ==================== Hero区域 ==================== */
.hero {
    background: linear-gradient(135deg, #8B4513 0%, #5D3A1A 50%, #4a2c10 100%);
    color: #fff;
    text-align: center;
    padding: 80px 20px 100px;
    position: relative;
    overflow: hidden;
}
/* 云纹装饰背景 */
.hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: 
        radial-gradient(ellipse 80px 40px at 10% 20%, rgba(255,255,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60px 30px at 85% 15%, rgba(255,255,255,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 100px 50px at 25% 70%, rgba(255,255,255,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 70px 35px at 75% 80%, rgba(255,255,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50px 25px at 50% 30%, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
}
/* 水波纹底部装饰 */
.hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60"><path d="M0,30 Q150,10 300,30 T600,30 T900,30 T1200,30 L1200,60 L0,60 Z" fill="%23faf8f5"/></svg>');
    background-size: cover;
    pointer-events: none;
}
.hero-content { position: relative; z-index: 1; }
/* 印章装饰 */
.hero-seal {
    position: absolute;
    top: 20px;
    right: 30px;
    width: 60px;
    height: 60px;
    border: 3px solid rgba(196, 30, 58, 0.6);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'MaShanZheng', cursive;
    font-size: 1.2rem;
    color: rgba(196, 30, 58, 0.8);
    transform: rotate(15deg);
    z-index: 2;
}
.hero-seal::before {
    content: '';
    position: absolute;
    top: 4px; left: 4px; right: 4px; bottom: 4px;
    border: 1px solid rgba(196, 30, 58, 0.4);
    border-radius: 2px;
}
.hero h1 {
    font-family: 'MaShanZheng', cursive;
    font-size: 3.5rem;
    letter-spacing: 0.15em;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    position: relative;
    display: inline-block;
}
/* 标题下装饰线 */
.hero h1::after {
    content: '';
    display: block;
    width: 120px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #c41e3a, transparent);
    margin: 15px auto 0;
}
.hero .subtitle { font-size: 1.2rem; opacity: 0.9; margin-bottom: 20px; letter-spacing: 0.1em; }
.hero .region-tag {
    display: inline-block;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 25px;
    padding: 10px 28px;
    font-size: 0.95rem;
    backdrop-filter: blur(5px);
    letter-spacing: 0.05em;
}

/* ==================== 导航栏 ==================== */
.nav-bar {
    background: linear-gradient(180deg, #fff 0%, #faf8f5 100%);
    box-shadow: 0 2px 16px rgba(139, 69, 19, 0.08);
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 12px 20px;
    border-bottom: 1px solid rgba(139, 69, 19, 0.08);
}
.nav-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    max-width: 1000px;
    margin: 0 auto;
    list-style: none;
}
.nav-list button {
    text-decoration: none;
    color: #666;
    font-size: 1rem;
    padding: 10px 20px;
    border-radius: 24px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    background: #fff;
    min-height: 48px;
    border: 1px solid rgba(139, 69, 19, 0.1);
    cursor: pointer;
    min-width: 50px;
    font-weight: 500;
    letter-spacing: 0.02em;
}
.nav-list button:hover {
    background: #8B4513;
    color: #fff;
    border-color: #8B4513;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(139, 69, 19, 0.2);
}
.nav-list button.active {
    background: linear-gradient(135deg, #8B4513 0%, #a0522d 100%);
    color: #fff;
    border-color: #8B4513;
    box-shadow: 0 4px 12px rgba(139, 69, 19, 0.25);
}

/* ==================== 主容器 ==================== */
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
.section { padding: 56px 0; border-bottom: 1px dashed rgba(139, 69, 19, 0.15); }
.section:last-child { border-bottom: none; }
.section-title {
    font-family: 'MaShanZheng', cursive;
    font-size: 1.8rem;
    color: #8B4513;
    margin-bottom: 32px;
    padding-left: 16px;
    border-left: 4px solid #c41e3a;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 0.05em;
}
.section-title::before { content: '◈'; color: #c41e3a; }
.section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(139, 69, 19, 0.15), transparent);
    margin-left: 16px;
}

/* ==================== 地级市分组 ==================== */
.city-section { 
    margin-bottom: 64px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.city-section.hidden { display: none; }
.city-header {
    position: relative;
    padding: 24px 28px;
    margin-bottom: 32px;
    border-radius: 16px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
    overflow: hidden;
}
/* 城市头部中式边框装饰 */
.city-header::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    pointer-events: none;
}
/* 角落装饰 */
.city-header::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
}
.city-header h2 {
    font-family: 'MaShanZheng', cursive;
    font-size: 2rem;
    letter-spacing: 0.1em;
    position: relative;
    z-index: 1;
}
.city-header .city-icon { font-size: 2.5rem; position: relative; z-index: 1; }
.city-header .city-desc { font-size: 0.9rem; opacity: 0.9; margin-top: 4px; position: relative; z-index: 1; letter-spacing: 0.03em; }

/* 各市主题色 - 仅应用到城市头部 - 调柔和 */
.city-nanjing .city-header { background: linear-gradient(135deg, #3d2b4d 0%, #5c3d6e 100%); }
.city-wuxi .city-header { background: linear-gradient(135deg, #8B4513 0%, #a0522d 100%); }
.city-xuzhou .city-header { background: linear-gradient(135deg, #a85032 0%, #c4614a 100%); }
.city-changzhou .city-header { background: linear-gradient(135deg, #4a6b3a 0%, #6b8a5a 100%); }
.city-suzhou .city-header { background: linear-gradient(135deg, #3d6b4a 0%, #5a8a6a 100%); }
.city-nantong .city-header { background: linear-gradient(135deg, #2d5a7a 0%, #4a7a9a 100%); }
.city-lianyungang .city-header { background: linear-gradient(135deg, #6b3d7a 0%, #8a5a9a 100%); }
.city-huaian .city-header { background: linear-gradient(135deg, #a85032 0%, #c46a4a 100%); }
.city-yancheng .city-header { background: linear-gradient(135deg, #3d5a8a 0%, #5a7aaa 100%); }
.city-yangzhou .city-header { background: linear-gradient(135deg, #4a7a4a 0%, #6a9a6a 100%); }
.city-zhenjiang .city-header { background: linear-gradient(135deg, #7a3d5a 0%, #9a5a7a 100%); }
.city-taizhou .city-header { background: linear-gradient(135deg, #3d6b5a 0%, #5a8a7a 100%); }
.city-suqian .city-header { background: linear-gradient(135deg, #5a4030 0%, #7a5a45 100%); }

/* ==================== 代表面食卡片 ==================== */
.hero-noodle {
    background: linear-gradient(135deg, #fffbf0 0%, #fff8eb 100%);
    border: 2px dashed #d4a574;
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 32px;
    position: relative;
}
/* 中式角落装饰 */
.hero-noodle::before, .hero-noodle::after {
    content: '❋';
    position: absolute;
    color: #d4a574;
    font-size: 1.2rem;
    opacity: 0.6;
}
.hero-noodle::before { top: 8px; left: 12px; }
.hero-noodle::after { bottom: 8px; right: 12px; }
.hero-noodle-title {
    font-family: 'MaShanZheng', cursive;
    font-size: 1.3rem;
    color: #8B4513;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.03em;
}
.hero-noodle-title::before { content: '🍜'; font-size: 1.1rem; }
.hero-noodle-content {
    font-size: 0.95rem;
    color: #555;
    line-height: 1.9;
    letter-spacing: 0.01em;
}
.hero-noodle-content p { margin-bottom: 8px; }
.hero-noodle-content strong { color: #8B4513; font-weight: 600; }

/* ==================== 区县标题 ==================== */
.district-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #8B4513;
    margin: 24px 0 16px;
    padding: 8px 16px;
    background: linear-gradient(135deg, #fff9f0 0%, #fff5e8 100%);
    border-left: 4px solid #c41e3a;
    border-radius: 0 10px 10px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.02em;
    position: relative;
}
/* 区县标题装饰符号 */
.district-title::before { 
    content: '◆'; 
    color: #c41e3a; 
    font-size: 0.65rem;
    transition: transform 0.3s ease;
}
.district-title:hover::before {
    transform: scale(1.2);
}

/* ==================== 美食卡片网格 ==================== */
.food-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
}
@media (min-width: 768px) { .food-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .food-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 1200px) { .food-grid { grid-template-columns: repeat(4, 1fr); } }

/* ==================== 美食卡片 ==================== */
.food-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    /* 多层阴影层次 */
    box-shadow: 
        0 2px 8px rgba(139, 69, 19, 0.06),
        0 4px 16px rgba(139, 69, 19, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    border: 1px solid rgba(139, 69, 19, 0.06);
}
.food-card:hover {
    /* hover时阴影扩散 */
    box-shadow: 
        0 8px 24px rgba(139, 69, 19, 0.12),
        0 16px 48px rgba(139, 69, 19, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    transform: translateY(-4px) scale(1.01);
    border-color: rgba(139, 69, 19, 0.1);
}
.food-card-image {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #f5f5f5;
}
.food-card-header {
    background: linear-gradient(135deg, #8B4513 0%, #9a6030 50%, #a0522d 100%);
    color: #fff;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
}
/* 卡片头部渐变装饰 */
.food-card-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 100%);
    pointer-events: none;
}
.food-name { 
    font-size: 1.05rem; 
    font-weight: 600; 
    margin-bottom: 6px;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
}
.food-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.food-tag {
    background: rgba(255,255,255,0.18);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.7rem;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.15);
}
.food-card-body { padding: 14px 16px 16px; }
.food-brief { 
    font-size: 0.85rem; 
    color: #666; 
    line-height: 1.6; 
    margin-bottom: 12px; 
    display: -webkit-box; 
    -webkit-line-clamp: 2; 
    -webkit-box-orient: vertical; 
    overflow: hidden;
    letter-spacing: 0.01em;
}
.food-footer { display: flex; justify-content: flex-end; }
.food-detail-btn {
    color: #8B4513;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: all 0.2s ease;
}
.food-card:hover .food-detail-btn {
    color: #c41e3a;
    gap: 6px;
}
.food-detail-btn::after { content: '›'; font-size: 1.1rem; transition: transform 0.2s ease; }
.food-card:hover .food-detail-btn::after { transform: translateX(2px); }

/* ==================== 美食对比说明 ==================== */
.compare-box {
    background: linear-gradient(135deg, #fffbf0 0%, #fff8eb 100%);
    border: 2px dashed #d4a574;
    border-radius: 16px;
    padding: 20px 24px;
    margin: 16px 0;
    position: relative;
}
/* 对比框角落装饰 */
.compare-box::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #d4a574, transparent);
}
.compare-title {
    font-weight: 600;
    color: #8B4513;
    margin-bottom: 12px;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
}
.compare-content { font-size: 0.9rem; color: #666; line-height: 1.85; letter-spacing: 0.01em; }
.compare-content p { margin-bottom: 10px; }
.compare-content strong { color: #8B4513; font-weight: 600; }

/* ==================== 模态窗口 ==================== */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
    backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal-content {
    background: #fff;
    border-radius: 20px;
    max-width: 600px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    box-shadow: 
        0 20px 60px rgba(0,0,0,0.15),
        0 8px 24px rgba(0,0,0,0.1);
}
.modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid rgba(139, 69, 19, 0.08);
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 1;
    border-radius: 20px 20px 0 0;
}
.modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: #f5f0eb;
    border: none;
    cursor: pointer;
    font-size: 1.4rem;
    color: #8B4513;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-weight: 300;
}
.modal-close:hover { 
    background: #8B4513; 
    color: #fff;
    transform: rotate(90deg);
}
.modal-title {
    font-family: 'MaShanZheng', cursive;
    font-size: 1.6rem;
    color: #8B4513;
    padding-right: 40px;
    letter-spacing: 0.03em;
}
.modal-location { font-size: 0.85rem; color: #999; margin-top: 6px; letter-spacing: 0.02em; }
.modal-body { 
    padding: 0; 
    max-height: calc(85vh - 80px);
    overflow-y: auto;
    scroll-behavior: smooth;
}
.modal-body-inner {
    padding: 16px 28px 32px;
}
.modal-section { margin-bottom: 24px; }
.modal-section-title { 
    font-weight: 600; 
    color: #8B4513; 
    margin-bottom: 10px; 
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 6px;
}
.modal-section-content { font-size: 0.95rem; color: #555; line-height: 1.85; letter-spacing: 0.01em; }
.modal-section-content p { margin-bottom: 8px; }
.modal-shop {
    background: linear-gradient(135deg, #faf8f5 0%, #f5efe8 100%);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 0.9rem;
    color: #666;
    border-left: 4px solid #c41e3a;
    line-height: 1.7;
}

/* ==================== 店铺列表样式 ==================== */
.shop-link {
    color: #555;
    text-decoration: none;
    display: block;
    transition: color 0.2s;
}
.shop-link:hover {
    color: #d4764e;
    text-decoration: underline;
}
.shop-item {
    padding: 10px 14px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fffbf0 0%, #fff8eb 100%);
    border-radius: 12px;
    font-size: 0.9rem;
    color: #555;
    line-height: 1.6;
    border-left: 3px solid #d4a574;
    transition: transform 0.2s, box-shadow 0.2s;
}
.shop-item:hover {
    transform: translateX(4px);
    box-shadow: 0 2px 8px rgba(139,69,19,0.1);
}
.shops-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.shop-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: linear-gradient(135deg, #fff9f0 0%, #fff5e8 100%);
    border-radius: 10px;
    border: 1px solid rgba(139, 69, 19, 0.1);
    transition: all 0.3s ease;
}

.shop-item:hover {
    transform: translateX(4px);
    border-color: rgba(196, 30, 58, 0.3);
    box-shadow: 0 2px 8px rgba(196, 30, 58, 0.1);
}

.shop-icon {
    color: #c41e3a;
    font-size: 1rem;
    flex-shrink: 0;
}

.shop-name {
    color: #555;
    font-size: 0.9rem;
    line-height: 1.5;
}

/* ==================== 弹窗导航栏 ==================== */
.modal-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(180deg, #fffbf5 0%, #fef6ee 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 12px 16px;
    margin: 0;
}

.modal-tab {
    padding: 6px 18px;
    border: none;
    background: rgba(255,255,255,0.7);
    color: #bba89a;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 20px;
    font-weight: 500;
    position: relative;
    letter-spacing: 0.5px;
}

.modal-tab:hover {
    color: #8B4513;
    background: rgba(255,255,255,0.95);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(139,69,19,0.1);
}

.modal-tab.active {
    color: #fff;
    background: linear-gradient(135deg, #e8a87c, #d4764e);
    font-weight: 600;
    box-shadow: 0 3px 12px rgba(212,118,78,0.25);
    transform: translateY(-1px);
}
.modal-shop strong { color: #8B4513; }

/* ==================== 统计信息 ==================== */
.stats-bar {
    background: linear-gradient(135deg, #fffcf8 0%, #faf5ef 100%);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    gap: 24px;
    border: 1px solid rgba(139, 69, 19, 0.08);
    box-shadow: 0 4px 20px rgba(139, 69, 19, 0.05);
}
.stat-item { text-align: center; position: relative; }
.stat-item::after {
    content: '';
    position: absolute;

    top: 50%;

/* ==================== 页脚 ==================== */
.footer {

    padding: 48px 24px;

}
/* 页脚顶部装饰 */
.footer::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #c41e3a, transparent);
}
/* 页脚云纹装饰 */
.footer::after {
    content: '';
    position: absolute;
    top: -20px; left: 0; right: 0;
    height: 40px;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 40"><path d="M0,40 Q100,20 200,30 T400,25 T600,35 T800,20 T1000,30 T1200,25 L1200,0 L0,0 Z" fill="%238B4513"/></svg>');

}

.hidden { display: none !important; }

【口感】软糯Q弹的小元宵，配上绵密起沙的红豆，甜而不腻超好吃<br>【地道标准】好的赤豆元宵，元宵要软糯到能拉丝但不能糊成一团；红豆要熬到起沙，舀一勺能看到红豆皮挂着汤；甜度要适中，甜到齁的肯定不正宗；最后那点桂花香是关键，闻不到桂花香的直接pass！"},{"name":"鸡汁汤包","tags":["秦淮名点"],"brief":"皮薄汤多，鲜美可口","desc":"选用老母鸡熬制高汤制成馅料，面皮薄如蝉翼，蒸熟后汤汁充盈。吃法讲究'轻轻提，慢慢移，先开窗，后喝汤'。","story":"鸡鸣汤包始于1955年，快七十年了，南京汤包界的扛把子。灵魂在于\"汤皮馅形\"四字——老母鸡加猪骨熬8小时，配上皮冻切小块拌进馅里，蒸熟变滚烫鲜汤。面皮用高筋面粉加鸭蛋清揉制，薄如蝉翼韧性十足，18到22道褶纹形如莲花。吃汤包得守口诀：\"轻轻提、慢慢移、先开窗、后喝汤\"，一口下去眉毛都要掉下来了！","shops":["鸡鸣汤包(狮子桥店)（南京市鼓楼区湖南路狮子桥7号，近玄武门站）","鸡鸣汤包(湖南路总店)（南京市鼓楼区湖南路185号，近狮子桥）","小李汤包(建康路店)（南京市秦淮区建康路250号，近夫子庙站）","祁家面馆（南京市秦淮区明瓦廊大香炉32-2号，近张府园站）"],"compare":"【汤底】老母鸡加猪骨熬8小时以上，熬到骨头都化了<br>【馅心】鸡汤、皮冻、鲜肉比例1:1:2，汤多馅足才够味<br>【吃法】轻轻提慢慢移，先开个小窗吸口汤，再整个吃掉<br>【口感】一咬满嘴都是鲜汤，皮薄馅大，鲜到眉毛都要掉下来了<br>【地道标准】正宗鸡汁汤包，戳个小洞能吸出一汤匙的汤才算合格；皮要薄到能透光，但提起不破；肉馅要能看到皮冻化开后泛着油光的汤汁；吃完全身热乎乎的，那才是真材实料熄出来的高汤！"},{"name":"蒋有记牛肉锅贴","tags":["百年老店","非遗"],"brief":"外脆里嫩，汤汁饱满","desc":"蒋有记是南京牛肉锅贴的代表品牌，始于清末。选用新鲜黄牛肉，馅料调制讲究，锅贴底脆皮黄，馅鲜汁多。","story":"蒋有记1922年创立，传了四代人，2013年评为南京老字号。选料严格——必须当天宰杀的新鲜黄牛肉，血水还没干就绞成馅。牛肉馅加花椒水顺一个方向搅打上劲，决定口感。煎制是技术活：先煎出金黄脆底，再加水盖盖焖熟，底部酥脆馅心还是温热汁水。配上老板独家秘制辣油，又香又辣一浇，绝了！","shops":["蒋有记(老门东店)（南京市秦淮区三条营49-3号，近老门东）","蒋有记(贡院西街店)（南京市秦淮区贡院西街18号，近夫子庙）","李记清真馆(打钉巷店)（南京市秦淮区评事街打钉巷1号，近张府园站）","西北桥头拉面大王(丁家桥店)（南京市鼓楼区丁家桥18号，近玄武门站）"],"compare":"【选料】必须用当天宰杀的新鲜黄牛肉，血水还没干就绞成馅<br>【馅料】牛肉馅里加花椒水，顺着一个方向搅打上劲，这步决定了口感<br>【煎制】平底锅先煎出金黄脆底，再加水焖熟，底部酥脆上头<br>【口感】外皮煎得金黄酥脆，咬开汁水四溢，牛肉鲜嫩带点嚼劲，越吃越香<br>【地道标准】正宗的蒋有记锅贴，底面要金黄酥脆，轻敲桌面能听见脆响；馅心要饱满多汁，咬开后汤汁能流到盘子里；肉馅要紧实有弹性，不是松散的那种；趁热吃，凉了就油腻了！"}],"建邺区":[{"name":"南湖鸭血粉丝汤","tags":["市井美食","代表小吃"],"brief":"汤鲜料足，鸭杂丰富","desc":"鸭血粉丝汤是南京的平民美食代表，选用新鲜鸭血、鸭肠、鸭肝等，配上粉丝和豆皮，用鸭骨汤吊味。","story":"南湖是建邺区的美食名片，鸭血粉丝汤绝对是抗把子！历史可追溯到朱元璋年间，不过真正让它走进百姓家的是南京人对鸭子的狂热——一年吃掉上亿只。灵魂在那碗汤：鸭骨鸡架熬4小时，鸭血必须当天新鲜，鸭肠用盐醋反复揉搓去腥。好的鸭血粉丝汤，鸭血嫩到入口即化，粉丝吸饱鲜汤Q弹有劲，浇上辣油——绝了！","shops":["回味鸭血粉丝汤(湖北路店)（南京市鼓楼区湖北路70号，近狮子桥）","回味鸭血粉丝汤(南京商厦店)（南京市玄武区龙蟠路1号南京商厦1层）","金原鸭血粉丝汤(总店)（南京市玄武区板仓街21幢101室）","鸭得堡老鸭汤鸭血粉丝（南京市玄武区玄武门街道多家分店）"],"compare":"【鸭血】只用当天的新鲜鸭血，结块的不行<br>【汤底】鸭骨鸡架熬4小时，熬到汤白味浓<br>【配料】鸭肠用盐和醋反复揉搓，去腥干净才入锅<br>【口感】鸭血滑嫩入口即化，粉丝吸饱了鲜汤超有味，鸭肠脆爽，汤鲜到心坎里<br>【地道标准】正宗鸭血粉丝汤，端上来要看见清亮的汤色，不是浑浊的；鸭血要嫩到夹不起来，一夹就断才算合格；粉丝要能挂在筷子上但不会糊成一团；最重要的是汤要鲜，但不能是那种鸡精味精调出来的鲜——好汤喝完嘴巴不干！"},{"name":"南湖胖子砂锅","tags":["夜宵传奇","老店"],"brief":"砂锅慢炖，粉丝筋道","desc":"南湖胖哥砂锅是南京夜宵的代表，选用牛骨、鸡架等熬制高汤，配上手工红薯粉和各种卤味，冬天喝一碗浑身暖和。","story":"南湖夜宵江湖里砂锅是抗把子！从1990年代路边摊发展成夜宵传奇。皮肚是灵魂——猪脊背肉皮经煮、晒、炸、泡四步，变得金黄疏松像海绵，吸饱汤汁一口爆鲜。汤底用猪骨老母鸡熬8小时，熬到浓白。配料皮肚、肉丝、青菜、木耳缺一不可，各有分工。特制辣油一浇，热气腾腾，冬天喝一碗比火锅还过瘾！","shops":["南湖胖子砂锅（南京市建邺区茶南大街13号，近南湖）","龙屋砂锅店（南京市秦淮区长乐路12号，近中山南路）","李四砂锅（南京市秦淮区光华东街18号13栋101室）","强仔砂锅店（南京市秦淮区大香炉32-3号，近张府园）"],"compare":"【皮肚】猪脊背肉皮要经过煮-晒-炸-泡四步，才能变得金黄疏松像海绵<br>【汤底】猪骨老母鸡熬8小时，汤色浓白才够鲜<br>【配菜】皮肚、肉丝、青菜、木耳缺一不可，少一样就不对味<br>【口感】皮肚吸满汤汁一口爆鲜，砂锅煮出来就是香，热乎乎的超满足<br>【地道标准】正宗砂锅端上来要热气腾腾、咕嘟冒泡；皮肚要能挂住汤汁，咬下去汤汁在嘴里迸发；配料要丰富，每样都带着汤的鲜味但本身的口感还在；吃完嘴唇微微发黏，那是骨髓油脂的证明！"}],"鼓楼区":[{"name":"狮子桥湖南路美食街","tags":["美食街区"],"brief":"品种丰富，热闹非凡","desc":"湖南路狮子桥美食街是南京最繁华的美食街区之一，汇集了各种特色小吃和连锁餐厅。","story":"狮子桥，南京美食的\"宇宙中心\"！全长300多米，2000年改造成美食步行街，从此成为夜经济标杆。最辉煌时每晚灯火通明、人声鼎沸，年轻人约会聚餐都往这儿跑。老字号扎堆：回味鸭血粉丝汤、尹氏鸡汁汤包、韩复兴盐水鸭……随便一家拉出来都是几十年老店，价格还实惠，逛吃一晚百来块管够！","shops":["回味鸭血粉丝汤(湖北路店)（南京市鼓楼区湖北路70号，近狮子桥美食街）","鸡鸣汤包(狮子桥店)（南京市鼓楼区湖南路狮子桥7号，近玄武门站）","韩复兴(湖北路店)（南京市鼓楼区湖北路88号，近狮子桥美食街）","尹氏汤包(狮子桥店)（南京市鼓楼区狮子桥7号，近湖南路）"],"compare":"【街区】南京最热闹的美食聚集地，老字号扎堆<br>【特色】尹氏汤包、金陵鸭血粉丝汤这些老牌子都在这儿<br>【氛围】年轻人约会聚餐的首选，逛吃逛吃一整天都不够<br>【口感】这条街从头吃到尾，胃都不够用，每家都有自己的绝活<br>【地道标准】正宗狮子桥美食街，要从街头走到街尾才算完整；每家老店门口都要排队；吃着锅贴喝着汤包，再来一份盐水鸭——这才是南京的正确打开方式；感受那种熙熙攘攘的烟火气！"}],"栖霞区":[{"name":"栖霞山素斋","tags":["佛教素食","地方特色"],"brief":"清淡养生，寺庙风味","desc":"栖霞寺素斋以寺庙斋菜为基础，选用寺内种植的蔬菜和菌菇，烹饪讲究清淡养生。","story":"栖霞寺是江南佛教名刹，素斋文化源远流长。寺内素斋遵循\"过午不食\"古训，选用寺里自种蔬菜和采的菌菇，简单烹饪却滋味悠长。每年秋天枫叶红了的时候，爬完栖霞山来寺里吃碗素面，清清淡淡，整个人都通透了。这大概就是佛家说的\"简单即是丰盛\"吧。","shops":["千佛斋素菜馆（南京市栖霞区栖霞街84号，栖霞山风景名胜区内，近栖霞寺）","千千素爱·栖福斋(栖霞山店)（南京市栖霞区栖霞街道栖霞古镇81-3栋，栖霞山景区大门斜对面）","栖霞寺法物流通处素食（南京市栖霞区栖霞山风景区内栖霞寺）","陆羽茶庄（南京市栖霞区栖霞山风景区内龙山之巅，近栖霞寺）"],"compare":"【食材】寺里自己种的蔬菜和采的菌菇，新鲜得很<br>【理念】清淡养生，遵循过午不食的古训<br>【烹饪】简单烹饪，不破坏食材本来的味道<br>【口感】清淡不寡淡，能吃出食材本身的味道，吃完感觉整个人都通透<br>【地道标准】正宗栖霞山素斋，要感受那份清净和虔诚；食材虽然都是素的，但味道要有层次；吃完身体轻松、没有负担；配上一杯栖霞山特有的茶，那才叫圆满！"}],"江宁区":[{"name":"江宁肚包鸡","tags":["农家土菜","滋补"],"brief":"猪肚包鸡，鲜美滋补","desc":"肚包鸡选用新鲜猪肚包裹整只土鸡，加药材慢炖数小时，汤色金黄，鸡肉酥烂，猪肚爽脆。","story":"江宁农村办喜事的必备宴席菜，相传始于清代。新鲜猪肚包整只土鸡，加药材慢炖数小时，汤色金黄，象征\"包你发财\"的好彩头。农家散养土鸡配上当天宰杀的新鲜猪肚，慢炖到鸡肉嫩滑猪肚弹牙，汤鲜得掉眉毛。到江宁农家乐点这道菜，老板都会笑着说：\"吃了包你发财！\"","shops":["江宁肚包鸡(宏运大道旗舰店)（南京市江宁区宏运大道4603号，近宁杭高速东山出口）","小高土菜馆（南京市江宁区文靖路章村社区旁，苏果往东100米）","江宁肚包鸡(殷巷店)（南京市江宁区金轮星光名座底商1-102号）","江宁肚包鸡(上坊店)（南京市江宁区万安北路与祈泽路交汇处西北角）"],"compare":"【选料】农家散养的土鸡加上当天宰杀的新鲜猪肚<br>【寓意】名字就图个吉利，包你发财嘛<br>【工艺】药材慢炖几个小时，把鲜味全炖进汤里<br>【口感】鸡肉嫩滑、猪肚弹牙，汤鲜得掉眉毛，越喝越补<br>【地道标准】正宗江宁肚包鸡，猪肚要能透光但不能破，里面包的鸡要酋烂到脱骨但不能散；汤色金黄要能看见油花但不能油腻；一口猪肚一口鸡再喝一口汤，这顺序不能乱！"},{"name":"湖熟板鸭","tags":["地理标志","特产"],"brief":"肉质紧实，咸香可口","desc":"湖熟板鸭是南京传统特产，选用湖熟地区养殖的麻鸭，经传统工艺腌制风干而成。","story":"湖熟是南京著名鸭乡，有\"金陵鸭市甲天下\"的美誉。板鸭始制于明代，还当过贡品进献朝廷，制作工艺列入了非遗。选用湖熟麻鸭，传统方法腌制风干，几百年的老手艺了。肉质紧实有嚼劲，咸香适中，越嚼越有味，下酒绝了！","shops":["谈守梅盐水鸭（南京市江宁区湖熟街道河北大街38号，近湖熟板鸭专卖店集中区）","祥贵板鸭厂（南京市江宁区湖熟镇，近湖熟板鸭市场）","灵顺板鸭店（南京市江宁区湖熟街道湖南西街，近湖熟镇中心）","湖熟各大农贸市场板鸭摊位（南京市江宁区湖熟街道各农贸市场）"],"compare":"【产地】湖熟是南京有名的鸭乡，鸭子养得好<br>【历史】明代就开始做了，还当过贡品呢<br>【工艺】传统方法腌制风干，几百年的老手艺了<br>【口感】肉质紧实有嚼劲，咸香适中，越嚼越有味，下酒绝了<br>【地道标准】正宗湖熟板鸭，颜色要呈琥珀色带着油光；闻起来有股独特的腊香但不刺鼻；切开来肉质紧实、纹理清晰；空口吃咸淡刚好，不需要再配主食！"}],"浦口区":[{"name":"珍珠泉泉水鸭","tags":["景区美食","特色"],"brief":"泉水养殖，肉质鲜嫩","desc":"珍珠泉泉水鸭选用在珍珠泉边放养的麻鸭，用泉水养殖，肉质更加鲜嫩无腥味。","story":"珍珠泉是南京著名景点，泉水清澈见底。用泉水养出的麻鸭肉质鲜嫩没腥味，制成的盐水鸭别有风味。相传乾隆皇帝曾在此品尝泉水鸭。泉水鸭做法简单，保持本味就好——好食材不需要花里胡哨，泉水炖出来的鲜甜，一吃就知道不一样。","shops":["定山阁（南京市浦口区珍珠街182号珍珠泉风景区内）","晴雨小馆（南京市浦口区珍珠街182号珍珠泉风景区内）","李记鸭血粉丝汤（南京市浦口区珍珠泉景区东门口50米）","老南京盐水鸭店（南京市浦口区沿山大道188号，近佛手湖）"],"compare":"【水源】珍珠泉边放养的麻鸭，喝的是泉水长大的<br>【特点】泉水养出来的鸭子，肉质鲜嫩没一点腥味<br>【烹饪】简单烹饪就行，保持泉水鸭的本味<br>【口感】肉质细嫩不柴，泉水炖出来的鲜甜，一吃就知道不一样<br>【地道标准】正宗珍珠泉泉水鸭，要能在泉边现吃最新鲜的；鸭肉要嫩到用筷子一戳就散；吃完嘴巴里有一股清甜的回甘，那是泉水的味道！"}],"六合区":[{"name":"六合猪头肉","tags":["地方名菜","老南京"],"brief":"肥而不腻，入口即化","desc":"六合猪头肉选用新鲜猪头，经慢火炖煮数小时，肉质酥烂，肥而不腻。","story":"六合猪头肉是南京\"老十八样\"菜品之一，起源于民国时期。用新鲜猪头慢火炖煮数小时，肥肉入口即化，瘦肉软烂不柴，满满的胶原蛋白。老南京人下酒就爱这一口，配碗白米饭绝了！俗话说\"猪头肉配酒，越喝越有\"，这股子市井烟火气，是六合人最实在的幸福感。","shops":["南门李记猪头肉老大家（南京市六合区雄州街道朝天街122号，近雄州城广场）","朱记六合猪头肉(总店)（南京市六合区沿江街道，近金庄河小菜场）","老东门六合猪头肉（南京市六合区雄州街道前街108号，近雄州镇中心）","赵秦猪头肉（南京市六合区八百桥镇赵秦村，近八百桥地铁站）"],"compare":"【选料】只用当天宰杀的新鲜猪头，烂糊的不要<br>【口感】肥肉入口即化，瘦肉软烂不柴，满满的胶原蛋白<br>【传承】民国时期老南京下酒的标配硬菜<br>【口感】肥而不腻软糯可口，配碗白米饭绝了，老人小孩都爱吃<br>【地道标准】正宗六合猪头肉，要选皮白毛净的鲜货；老卤是关键，颜色要透亮但不能发黑；切成薄片要能透光但不能散；一口咬下去，肥而不腻、软糯可口，这才是合格的老南京味道！"},{"name":"龙袍蟹黄汤包","tags":["时令美味","特色"],"brief":"蟹黄饱满，鲜美无比","desc":"龙袍蟹黄汤包在传统汤包基础上加入更多蟹黄，选用阳澄湖大闸蟹的蟹黄制成，蟹香浓郁。","story":"龙袍街道因长江泥沙堆积形似龙袍而得名，出产的蟹黄汤包是秋季时令美味。选用长江蟹，个大黄多，蟹黄塞得满满当当。传统汤包手艺，皮薄汤多，咬开满嘴蟹黄香，鲜到舌头都要化了！每年秋天，南京人都会专程开车来龙袍吃这一口，过季就没了。","shops":["龙袍人家酒楼（南京市六合区龙袍街道龙江路1号，近龙袍镇中心）","千禧大酒店（南京市六合区龙袍街道划子口东路5号，近龙袍镇转盘）","聚合庄大酒店（南京市六合区龙袍街道长江社区13组1号，近龙袍蟹黄汤包一条街）","程二农庄饭店（南京市六合区龙袍街道长江社区3组，近龙袍镇）"],"compare":"【选蟹】必须是长江蟹，个头大蟹黄多<br>【时令】秋天才是吃它的时候，过季就没了<br>【工艺】传统汤包手艺，蟹黄塞得满满当当<br>【口感】咬开满嘴蟹黄香，鲜到舌头都要化了，皮薄汤多超满足<br>【地道标准】正宗龙袍蟹黄汤包，提起要像个灯笼一样圆滚滚、晃悠悠的；皮要薄到能看见里面黄色的蟹油；戳个洞能吸出满满一汤匙的汤；一口咬下去，蟹黄的鲜香在嘴里炸开，这才叫过瘾！"}],"溧水区":[{"name":"溧水手抓鸡","tags":["农家土菜"],"brief":"手撕食用，鲜嫩入味","desc":"选用溧水本地土鸡，用秘制调料腌制后蒸制，食用时直接用手撕开，肉质鲜嫩入味。","story":"溧水是南京生态大区，出产的土鸡品质优良。手抓鸡吃法豪放，直接手撕着吃，大口吃肉超爽，符合南京人\"大碗喝酒大块吃肉\"的性格。山里放养的土鸡肉质鲜嫩多汁，手撕的比切的好吃太多。到溧水农家乐点一只，豪爽地撕着吃，有种大口吃肉的快感。","shops":["芮记手抓鸡（南京市溧水区洪蓝收费站北侧，近溧水城区）","洪蓝七里店手抓鸡老鹅店（南京市溧水区洪蓝街道凤凰井路266号18幢118-119室）","溧水各大农家乐（南京市溧水区白马镇石头寨村、近天生桥景区周边）","溧水城区各大土菜馆（南京市溧水区永阳镇）"],"compare":"【选鸡】溧水本地土鸡，山里放养的才够味<br>【吃法】直接手撕着吃，大口吃肉超爽<br>【风格】豪放不羁，跟南京人性格一样直爽<br>【口感】鸡肉鲜嫩多汁，手撕的比切的好吃太多，有种大口吃肉的快感<br>【地道标准】正宗溧水手抓鸡，要选山里放养的土鸡，个头不大但肉质紧实；撕开来要能看到鸡肉的纹理，汁水要能往下滴；调料味要渗进去但不能盖住鸡肉本身的鲜；吃完手指头都要舔干净才算过瘾！"},{"name":"天生桥豆腐","tags":["地方特产"],"brief":"手工制作，豆香浓郁","desc":"天生桥地区的手工豆腐选用优质黄豆，用当地井水点制，口感细腻豆香浓郁。","story":"天生桥是溧水明代人工运河遗址，当地村民用运河水磨豆腐传了几百年。纯手工磨制，当地井水点制，保留了老一辈的做法。入口即化超嫩滑，豆香浓郁，比超市买的强太多。简单的豆腐，做出不简单的味道，靠的就是好水和老手艺。","shops":["天生桥农家乐（南京市溧水区天生桥景区周边多家农家乐）","溧水各大农贸市场豆腐摊位（南京市溧水区天生桥镇、永阳镇）","天生桥景区内农家乐（南京市溧水区天生桥风景区内）","溧水城区正宗手工豆腐店（南京市溧水区永阳镇多家豆腐作坊）"],"compare":"【水源】用当地的井水点豆腐，水质好豆腐才嫩<br>【工艺】纯手工磨制，保留了老一辈的做法<br>【历史】运河水磨豆腐传了几百年<br>【口感】入口即化超嫩滑，豆香浓郁，比超市买的强太多<br>【地道标准】正宗天生桥豆腐，要白嫩到能透光，拿在手里颤巍巍的；闻起来有股淡淡的豆腥味，不是那种酸馊的；入口即化但不能碎成渣；凉拌要清脆爽口，做汤要能吸饱汤汁！"}],"高淳区":[{"name":"固城湖螃蟹","tags":["地理标志","时令"],"brief":"青壳白肚，金爪黄毛","desc":"固城湖螃蟹是江苏著名大闸蟹品种，与阳澄湖螃蟹齐名。蟹黄饱满，蟹膏肥美。","story":"固城湖是江苏最大淡水湖之一，水质清澈水草丰茂，养了两千多年螃蟹，古代还当过贡品。特点是\"青壳白肚、金爪黄毛\"，跟阳澄湖螃蟹齐名。每年秋天固城湖开捕，老饕们都知道这口不比阳澄湖差，价格还实在不少！","shops":["固城湖螃蟹市场（南京市高淳区淳溪镇镇北路36号，固城湖螃蟹品牌运营中心）","荣华楼（南京市高淳区淳溪街道通贤街86号，近高淳老街）","高淳雅宴（南京市高淳区淳溪街道湖滨大道175号，近固城湖）","冯记水产固城湖螃蟹(南京总部)（南京市建邺区新安江街65-13号，近河西）"],"compare":"【标志】青壳白肚、金爪黄毛，一眼就能认出来<br>【产地】固城湖水质清澈，水草丰茂，螃蟹住得可好了<br>【历史】养了两千多年了，古代还当过贡品<br>【口感】蟹肉鲜甜弹牙，蟹黄饱满醇香，吃一只想两只<br>【地道标准】正宗固城湖螃蟹，青壳要青得发亮，白肚要白得干净、金爪要有力黄毛要浓密；蒸熟后蟹黄要红得发亮、饱满到要溢出来；打开蟹盖，香味要扑鼻；吃完了，手上那股蟹香久久不散！"},{"name":"高淳老街糕点","tags":["老街美食","特产"],"brief":"手工糕点，传统风味","desc":"高淳老街上的传统糕点，包括香脆饼、咸烧饼、桂花糕等，都是手工制作的传统点心。","story":"高淳老街是江苏保存最完好的古街之一，街上的糕点铺子传了几代人了。传统手工制作，青团、米糕、云片糕……品种多到眼花。老街糕点用的是传统木模压花，每一块都是手艺人的心血。逛老街必须带几盒回去，送人倍儿有面子！","shops":["马家糕饼坊(高淳老街店)（南京市高淳区高淳老街99号，近中山大街）","老吴蒸糕（南京市高淳区高淳老街，近中山大街）","高淳老街各糕点摊位（南京市高淳区淳溪老街全线）","高淳非遗展示馆糕点区（南京市高淳区高淳老街内，近杨厅）"],"compare":"【工艺】明清时期传下来的手艺，现在会做的不多了<br>【品种】香脆饼、咸烧饼、桂花糕，种类可多了<br>【用途】走亲访友带一盒，特别有面子<br>【口感】各有各的味，甜的咸的都有，传统糕点的味道就是正<br>【地道标准】正宗高淳老街糕点，要现做现卖才好吃；云片糕要薄如纸、透如绢；董糖要七层折叠、层层分明；买的时候要选没有添加香精色素的，吃完嘴里是粮食本身的甘甜！"}],"代表面食":[{"name":"皮肚面","tags":["南京代表面食","必吃"],"brief":"皮肚金黄酥脆，高汤鲜美，配菜丰富","desc":"皮肚面是南京人的灵魂面食。皮肚即油炸肉皮，经煮-晒-炸-泡四步变成金黄疏松的美味孔洞结构，吸满高汤后鲜美无比。配菜丰富：猪肝、肉丝、青菜、木耳，灵魂是那一勺辣油。收尾的溏心蛋是点睛之笔。","story":"皮肚面是南京人的\"灵魂面\"！皮肚就是猪皮经煮晒炸泡后的产物，金黄疏松像海绵，吸饱汤汁一口爆鲜。配上皮肚、肉丝、猪肝、青菜、木耳、鹌鹑蛋，满满一大碗，汤鲜味浓。南京人吃皮肚面有讲究——加辣油、加醋，呼噜呼噜吃完，浑身通透！","shops":["易记皮肚面(明瓦廊店)（南京市秦淮区明瓦廊101-103号，近张府园站）","项记面馆(明瓦廊店)（南京市秦淮区明瓦廊125-1号，近新街口）","祁家面馆（南京市秦淮区明瓦廊大香炉32-2号，近张府园站）","巴子面馆（南京市秦淮区玉带园15幢48栋102室，近张府园站）","戴君华面馆（南京市建邺区文体西街139号-15号，近南湖）"],"compare":"【皮肚】猪脊背肉皮经煮-晒-炸-泡四步，变成金黄疏松的蜂窝状<br>【汤底】猪骨老母鸡熬8小时，汤白味浓<br>【配菜】皮肚、肉丝、青菜、木耳一样都不能少<br>【口感】皮肚吸饱汤汁一口爆鲜，面条劲道汤头浓，一碗下去超满足<br>【地道标准】正宗南京皮肚面，端上来要看见汤色浓郁但不浑浊；皮肚要金黄蓬松，咬下去汤汁迸发；面条要挂在筷子上但不会断；吃完嘴巴会粘粘的，那是皮肚胶原蛋白的证明！"}]}},"wuxi":{"name":"无锡","icon":"🌸","desc":"太湖佳肴，甜鲜风味","districts":{"梁溪区":[{"name":"三凤桥酱排骨","tags":["无锡名片","非遗","中华老字号"],"brief":"甜中带咸，骨酥肉烂","desc":"无锡酱排骨选用猪肋排，经慢火酱制，色泽红亮，甜中带咸，骨酥肉烂。是无锡菜的代表作。","story":"三凤桥始创于1927年，前身为慎余肉庄。相传创始人王云清在制作酱排骨时，独创了一套秘制配方，选用太湖猪肋排，用酱油、冰糖、黄酒等慢火焖制。2016年被评为中国十大地标美食。著名数学家华罗庚回乡时必点此菜，赞不绝口。","shop":"三凤桥肉庄（无锡市梁溪区中山路317号，近胜利门广场）","compare":"【选料】太湖黑猪的肋排，四指宽、骨肉匀称才够肥瘦相间<br>【工艺】炒糖上色、老汤续煮、三烫三焖，一步都不能省<br>【讲究】冰糖提鲜，酱香醇厚，骨头都能嚼动才叫到位<br>【口感】甜中带咸超开胃，肉酥烂脱骨，老人小孩都能吃，舔手指那种香"},{"name":"王兴记小笼馒头","tags":["无锡名点","百年老店"],"brief":"皮薄汁多，味甜鲜美","desc":"无锡小笼馒头以皮薄、汁多、味甜著称。选用老母鸡汤冻制馅，一口咬下汤汁四溢。","story":"王兴记始创于1913年，是无锡最著名的小笼馒头店。创始人王锡琪在传统小笼基础上改进工艺，馅心加入皮冻，蒸熟后汤汁更加丰盈。'轻轻提，慢慢移，先开窗，后喝汤'的吃法已成为江南食客的共识。","shop":"王兴记（无锡市梁溪区中山路223号，近学前东路）","compare":"【汤底】老母鸡熬成冻调进馅里，鲜味足足的<br>【皮薄】皮薄得像纸一样，透光能看见里面的汤<br>【吃法】轻轻提慢慢移，先咬个小口把汤吸了，再一口吞<br>【口感】一咬满嘴鲜汤，肉馅紧实带甜，无锡人就好这口鲜甜"}],"滨湖区":[{"name":"太湖三白","tags":["太湖名产","原汁原味"],"brief":"白鱼、白虾、银鱼，太湖三宝","desc":"太湖三白指白鱼、白虾和银鱼，是太湖最著名的水产三宝。烹饪以清蒸、白灼为主，讲究原汁原味。","story":"太湖三白自古是文人墨客的挚爱。唐代诗人白居易曾在诗中写道：'未能抛得杭州去，一半勾留是此湖'，其中便有对太湖鱼鲜的赞美。清代康熙皇帝南巡时，太湖三白被列为御膳贡品。","shop":"横云饭店（无锡市滨湖区鼋头渚景区内，鼋渚路1号）","compare":"【三白】白鱼、白虾、银鱼，都是太湖里的宝贝<br>【烹饪】清蒸白灼最地道，重口味反而糟蹋了<br>【讲究】原汁原味，吃的就是太湖水的鲜<br>【口感】白鱼细嫩、白虾鲜甜、银鱼无骨，入口就是湖水的清甜"},{"name":"太湖船点","tags":["江南名点","精致"],"brief":"形态各异，色彩鲜艳","desc":"太湖船点是江南水乡船上食用的精美点心，选用米粉制成，形态有花卉、瓜果、动物等，色彩鲜艳，栩栩如生。","story":"太湖船菜始于明代，相传是太湖渔民为招待贵客而创制的点心。船点师傅要在颠簸的船上完成制作，需掌握精湛的捏塑技艺。形态以花鸟鱼虫为主，每件都是艺术品。","shop":"太湖饭店（无锡市滨湖区锦园路1号）","compare":"【起源】太湖渔民招待贵客的手艺，传了几百年<br>【工艺】用米粉手工捏制，没有点功夫还真做不来<br>【形态】花鸟鱼虫全都能捏出来，栩栩如生不忍下口<br>【口感】软糯香甜好看又好吃，是点心也是艺术品"}],"锡山区":[{"name":"甘露青鱼","tags":["地理标志","冬季特产"],"brief":"肉质鲜嫩，体型硕大","desc":"甘露青鱼产于锡山区鹅湖镇，肉质紧实鲜美，体型硕大，是无锡人过年必备的年货。","story":"鹅湖镇甘露地区水质清澈，水草丰茂，是青鱼的天然养殖场。甘露青鱼养殖历史超过三百年，相传清代时曾作为贡品进献朝廷。'甘露青鱼年夜饭'是无锡人除夕的必备菜肴。","shop":"鹅湖镇青鱼养殖基地（无锡市锡山区鹅湖镇甘荡路68号）","compare":"【产地】鹅湖镇水质清澈，水草丰茂，鱼养得特别肥<br>【品质】肉质紧实鲜美，个头能长到老大一条<br>【用途】无锡人过年餐桌上必须有它，图个年年有余的好兆头<br>【口感】鱼肉细腻无土腥味，红烧清蒸都好吃，鲜到眉毛掉"}],"惠山区":[{"name":"惠山油酥","tags":["惠山特产","非遗"],"brief":"酥脆掉渣，香甜可口","desc":"惠山油酥是惠山古镇的传统糕点，用面粉和猪油制成，烘烤后酥脆多层，香甜可口。","story":"惠山油酥始于明代，相传是惠山寺僧人所创。选用惠山本地优质面粉和猪油，用古法烘制而成。每年农历四月十五惠山庙会期间，香客必购此糕点作为祭品。","shop":"朱顺兴油酥店（无锡市惠山区惠山古镇秦园街13号）","compare":"【历史】明代惠山寺的僧人发明的，做了几百年了<br>【原料】惠山本地的面粉和猪油，品质就是不一样<br>【烘制】古法烘烤，层层起酥，一口咬下去酥得直掉渣<br>【口感】酥脆多层，越嚼越香，惠山独有的味道别处可吃不到"}],"新吴区":[{"name":"太湖银鱼","tags":["太湖特产","时令"],"brief":"通体透明，细嫩鲜美","desc":"太湖银鱼是太湖特产鱼类，体形细长如银，通体透明，可炒可蒸可做汤。","story":"太湖银鱼与白鱼、白虾并称'太湖三白'。据《太湖备考》记载，银鱼在宋代已被列为贡品。康熙皇帝南巡时品尝后，赞其'洁白如玉，鲜美无比'。","shop":"新吴区各大太湖餐厅（无锡市新吴区太湖堤坝路附近）","compare":"【特点】无骨无刺，银白细长像面条<br>【烹饪】可炒蛋可做羹可清蒸，怎么做都好吃<br>【讲究】新鲜吃最好，不宜久存<br>【口感】肉质细嫩入口即化，老人小孩都能吃，湖鲜的鲜甜"}],"代表面食":[{"name":"阳春面","tags":["无锡代表面食","经典"],"brief":"酱油猪油清汤，简单却美味","desc":"无锡阳春面看似简单，实则讲究。猪油要用现熬的，酱油要用秘制的，再配上一把细面。看似清汤寡水，实则鲜香四溢。","story":"阳春面是无锡人早餐的经典选择，相传始于清代。名字来源于农历十月为'小阳春'的节气。无锡人讲究'头汤面'，清晨第一锅水下的面最是爽滑，一碗下肚，浑身舒坦。著名作家陆文夫在小说《美食家》中专门描写过无锡阳春面的讲究。","shop":"拱北楼面馆（无锡市梁溪区中山路258号，近崇安寺）","compare":"【历史】近200年了，2015年拿下了国家地理标志<br>【非遗】省级非遗，老手艺得保护<br>【标准】皮薄如纸吹弹即破，这才有水平<br>【口感】简单却超好吃，面滑汤鲜超满足"}]}},"xuzhou":{"name":"徐州","icon":"🏯","desc":"彭城风味，汉韵美食","districts":{"云龙区":[{"name":"老家地锅","tags":["徐州名菜","地锅鸡"],"brief":"铁锅炖鸡，贴饼蘸汤","desc":"地锅鸡是徐州名菜，大铁锅周围贴上手擀面饼（喝饼），中间炖煮散养土鸡。锅边饼一面软一面脆，蘸满酱汤风味十足。","story":"地锅鸡源于微山湖畔渔民的传统做法，相传刘关张当年在此征战时，百姓用地锅炖鸡招待将士。今已成为徐州美食的代表符号，登上《舌尖上的中国》第二季。","shop":"老家地锅（徐州市云龙区湖北路与煤建路交叉口北150米路西）","compare":"【起源】微山湖渔民发明的，船上生活催生的美食<br>【铁锅】必须用老铁锅，导热均匀才炒得出那味<br>【贴饼】面饼现贴现烙，贴在锅边才够焦香<br>【口感】贴饼蘸汤超有味，饼底焦脆上面软糯，渔家风味绝了"},{"name":"凤岐把子肉","tags":["徐州名菜","下饭神器"],"brief":"肥而不腻，入口即化","desc":"把子肉是徐州传统名菜，选用五花肉用蒲草捆扎，故名把子。经长时间炖煮，肉质酥烂，肥而不腻，是下饭的绝佳配菜。","story":"把子肉的名称源于刘备、关羽、张飞三人拜把子的故事。相传三人结义时，厨师用五花肉做成菜肴庆贺，因用草绳捆扎而得名。如今把子肉已成为徐州快餐的灵魂，配上一碗白米饭，是徐州人最日常的满足。","shop":"凤岐把子肉（徐州市云龙区青年路286号）","compare":"【历史】清代就有了，中华老字号<br>【选肉】只用五花肉，肥瘦相间三层肉才够香<br>【工艺】大火烧开小火焖4小时以上，炖到肉酥烂入味<br>【口感】入口即化肥而不腻，酱香浓郁配米饭绝了，一块管饱那种"}],"泉山区":[{"name":"百味地锅鸡","tags":["徐州名菜","连锁品牌"],"brief":"面宽如裤带，辣油飘香","desc":"徐州板面最大的特点是大——碗大、面宽、肉多。手工抻出的面条劲道有嚼劲，铺上厚厚一层牛肉，灵魂是那一勺辣椒油。","story":"徐州板面源于三国时期，相传张飞镇守徐州时喜爱这种面食。面条宽大如同腰带，体现了北方人的豪爽性格。2016年，徐州地锅鸡制作技艺被列入市级非物质文化遗产。","shop":"百味地锅鸡（徐州市泉山区夹河西街2号，苏宁广场旁）","compare":"【柴火】传统用木柴烧火，火焰旺才够香<br>【铁锅】土灶铁锅，地道农村风味<br>【氛围】围坐土灶台边吃，边吃边聊特别热闹<br>【口感】鸡肉炖得软烂，贴饼吸满鸡汤超好吃，农村的味道就是香"},{"name":"马市街饣它汤","tags":["徐州第一汤","非遗"],"brief":"汤色乳白，鲜香浓郁","desc":"饣它汤是徐州第一美食，历史可追溯至4000多年前，相传由彭祖创制的雉羹演变而来，被誉为'天下第一羹'。用老母鸡、猪骨、麦仁等慢火熬制数小时。","story":"据《徐州地方志》记载，饣它汤源于彭祖创制的'雉羹'。彭祖是中国烹饪鼻祖，相传活了八百年。乾隆皇帝下江南时路过徐州，品尝此汤后赞不绝口，御赐'天下第一羹'。","shop":"马市街饣它汤（徐州市云龙区解放路69号）","compare":"【历史】源于彭祖创的天下第一羹，老祖宗的手艺<br>【熬制】老母鸡猪骨麦仁一起熬10到16小时，熬到骨头都酥了<br>【配料】鳝鱼骨是徐州特色，加进去鲜味翻倍<br>【口感】汤浓味厚超暖胃，一碗下肚整个人都热乎了，早餐必备"}],"鼓楼区":[{"name":"三中高皇羊肉馆","tags":["徐州老字号","羊肉"],"brief":"三十年老店，羊肉汤白","desc":"选用本地青山羊，用羊骨羊头熬制浓白羊汤，配上手切羊肉，鲜而不膻。","story":"三中高皇羊肉馆始创于1992年，创始人李师傅在铜山高皇镇学习羊肉制作技艺，后迁至市区。三十年坚持用真材实料，羊汤醇厚不膻，是徐州人冬日暖身首选。","shop":"三中高皇羊肉馆（徐州市鼓楼区中学街2号）","compare":"【选羊】只用本地青山羊，品种纯正没膻味<br>【熬汤】羊骨羊头熬24小时，熬到汤白如奶<br>【吃法】手切羊肉原汁原味，薄薄一片入口即化<br>【口感】汤鲜肉嫩没有膻味，冬天喝一碗全身都暖了"}],"铜山区":[{"name":"棉布地锅鸡","tags":["铜山名吃","总店"],"brief":"蜂蜜调味，甜辣适口","desc":"棉布地锅鸡是徐州地锅鸡的代表品牌，选用本地土鸡，用蜂蜜代替白糖调味，饼子薄如蝉翼。","story":"棉布地锅鸡始于铜山区刘集镇棉布村，相传已有三代传承。创始人张师傅改良了传统配方，用蜂蜜调味使甜味更加柔和，饼子薄透可见光，是地锅鸡中的极品。","shop":"棉布地锅鸡总店（徐州市铜山区刘集镇棉布村，需自驾）","compare":"【蔬菜】十几种新鲜蔬菜配着吃，营养丰富<br>【面饼】贾汪石磨面粉做面饼，麦香十足<br>【烹饪】地锅柴火慢炖，炖的时间够长才入味<br>【口感】菜香肉香饼香混一块，锅里炖啥都好吃"}],"贾汪区":[{"name":"贾汪菜煎饼","tags":["贾汪特色","街头美食"],"brief":"蔬菜丰富，外脆里嫩","desc":"菜煎饼是贾汪地区的特色小吃，两张薄饼夹入十余种新鲜蔬菜，煎烤至外皮焦脆，内馅鲜香。","story":"贾汪菜煎饼源于矿区文化，相传是矿工家属为丈夫准备的午餐。选用新鲜蔬菜，现切现包，配上贾汪特产的石磨面粉，口感格外香脆。","shop":"贾汪老味菜煎饼（徐州市贾汪区贾汪镇中心市场内）","compare":"【用饼】现烙的煎饼才够香，凉了就不脆了<br>【馅料】十几种新鲜蔬菜随你挑，想吃啥加啥<br>【工艺】电饼铛现煎现做，三分钟就好<br>【口感】外皮酥脆里面软，蔬菜新鲜脆甜，当早餐超健康"}],"睢宁县":[{"name":"王集香肠","tags":["睢宁特产","非遗"],"brief":"土猪制作，风干咸香","desc":"王集香肠选用本地土猪后腿肉，用传统工艺腌制风干，口感紧实，咸香可口。","story":"王集香肠始创于清末，相传是王集村张姓农户所创。选用散养土猪，配以秘制香料腌制，风干七七四十九天而成。其制作技艺已传承五代，被列入县级非物质文化遗产。","shop":"王集香肠老店（徐州市睢宁县王集镇中心街58号）","compare":"【选肉】只用本地土猪后腿肉，肥瘦比例刚好<br>【腌制】盐糖料酒腌入味，腌不够就寡淡<br>【风干】自然风干49天，时间短了味道就不对<br>【口感】越嚼越香越有味，下饭下酒都绝了，过年必备"}],"邳州市":[{"name":"邳州盐豆子","tags":["邳州特产","传统美食"],"brief":"发酵咸香，配饭佳品","desc":"盐豆子是邳州传统发酵食品，用黄豆发酵后加入辣椒、盐等调料制成，可长期保存。","story":"邳州盐豆子有'邳州臭豆腐'之称，相传始于东汉末年。当地农民将黄豆煮熟后放在草垛中自然发酵，数日后取出加入辣椒和盐腌制。'家有盐豆子，吃饭不费事'是邳州人的口头禅。","shop":"邳州老城土菜馆（徐州市邳州市解放路138号）","compare":"【发酵】黄豆煮熟后自然发酵，长满菌丝才行<br>【配料】辣椒粉盐芝麻一拌，香辣过瘾<br>【历史】邳州人的下饭神器，比臭豆腐还香<br>【口感】咸香带辣超下饭，配馒头卷饼都好吃，闻着臭吃着香"}],"沛县":[{"name":"沛县狗肉","tags":["沛县名吃","历史典故"],"brief":"鼋汁烹制，酥烂入味","desc":"沛县狗肉选用本地特产肉狗，用鼋鱼汁（鼋汁）慢炖，色泽红亮，肉质酥烂。","story":"沛县狗肉与樊哙有关。相传刘邦微时结识屠狗的樊哙，后刘邦起事，樊哙以狗肉相赠。沛县狗肉用鼋鱼汁烹制，故称'鼋汁狗肉'，肉质酥烂脱骨，毫无腥味。","shop":"樊哙路狗肉一条街（徐州市沛县樊哙路，近汽车站）","compare":"【历史】跟刘邦樊哙都有故事的名菜<br>【鼋汁】用鼋鱼汁来烹制，这是祖传秘方<br>【口感】肉酥烂脱骨，老人都能嚼动，香味独特<br>【口感】入口即化香到飞起，凉热都好吃，历史名菜不是吹的"}],"代表面食":[{"name":"徐州板面","tags":["徐州代表面食","必吃"],"brief":"面宽如裤带，辣油飘香","desc":"徐州板面最大的特点是大——碗大、面宽、肉多。手工抻出的面条劲道有嚼劲，铺上厚厚一层牛肉，灵魂是那一勺辣椒油和几粒尖椒。看似粗犷，实则细节满满。","story":"徐州板面源于三国时期，相传张飞镇守徐州时，因军务繁忙，常常要求厨师快速准备食物。厨师便将面团擀成宽条，快速煮熟后浇上肉卤，这便是板面的雏形。如今板面已成为徐州人的日常主食，'徐州板面'更是遍布全国，成为徐州美食的名片。","shop":"正宗路家棉布地锅鸡（徐州市泉山区西苑民和园东门对面）","compare":"【面条】手工抻制，反复揉搓摔打才够劲道<br>【宽窄】面条约两厘米宽，太细没有嚼劲<br>【辣油】辣椒油是灵魂，不辣不香不过瘾<br>【口感】面条滑溜筋道，浇上辣油香到流口水，一碗下去浑身舒坦"}]}},"changzhou":{"name":"常州","icon":"🎋","desc":"江南水乡，鱼米之乡","districts":{"天宁区":[{"name":"常州银丝面","tags":["常州代表","非遗"],"brief":"面细如银丝，汤鲜面滑","desc":"银丝面面细如丝、色白似雪，关键在于用食碱和鸡蛋清和面，配上鸡清汤。面条在沸水中翻滚15秒即捞出，根根分明。","story":"常州银丝面创始于清代，乾隆皇帝南巡时曾品尝此面，赞不绝口。面粉中加入鸡蛋清和食用碱，经过反复揉搓和擀压，形成独特的爽滑口感。著名数学家华罗庚曾赋诗赞美：'银丝一根面，故乡万缕情'。","shop":"常州银丝面馆（常州市天宁区麻巷公寓1号甲单元102室，天宁寺南大门斜对面）","compare":"【和面】面粉加鸡蛋清和食用碱，面才够爽滑<br>【压面】反复碾压多次，压到位才劲道<br>【火候】沸水下锅15秒即捞，早了夹生过了糊<br>【口感】面条细如银丝爽滑Q弹，吸溜一口超满足"},{"name":"义隆素菜馆麻油素面","tags":["百年老店","素食"],"brief":"素汁飘香，面条劲道","desc":"义隆素菜馆只卖素面，酱油、麻油、白糖熬制的素汁喷香，面条劲道。","story":"义隆素菜馆始创于1923年，是常州唯一只做素面的老店。百年只卖一碗面，靠的是独门素汁配方。相传创始人曾在天宁寺学习厨艺，将寺庙素斋的精华融入面中。","shop":"义隆素菜馆（常州市天宁区局前街78号）","compare":"【素汁】酱油麻油白糖秘方调的，简单却超香<br>【百年】1923年开业到现在，一碗面卖了一百年<br>【专注】就卖这一碗面，一辈子就做一件事<br>【口感】麻油香面滑爽，简单朴素却让人惦记，这就是老字号的味道"}],"钟楼区":[{"name":"常州糕团店大麻糕","tags":["常州特产","老字号"],"brief":"外酥里软，香甜可口","desc":"常州大麻糕有甜咸两种，外皮酥脆，内里松软。甜的香甜，咸的咸香。","story":"常州大麻糕始于清代，是常州人最爱的家常点心。选用优质面粉和猪油，用传统工艺烘制。清同治年间，常州糕团店的前身'义和斋'开始专营此糕，如今已有150年历史。","shop":"常州糕团店（常州市钟楼区官保巷13-19号，南大街地铁站4号口步行360米）","compare":"【口味】甜咸两种口味，甜的香脆咸的够味<br>【历史】清同治年间就有的老手艺，传了150年<br>【工艺】传统工艺烘制，师傅凭经验看火候<br>【口感】外酥里软层层分明，咬一口满嘴香，吃一块想两块"},{"name":"迎桂馒头店小笼包","tags":["常州名点","老字号"],"brief":"皮薄馅多，汁水鲜美","desc":"迎桂馒头店的小笼包皮薄馅大，汤汁丰富，选用新鲜猪肉和蟹黄调制。","story":"迎桂馒头店始创于清光绪年间，是常州最著名的小笼包店。创始人陈氏祖籍苏州，将苏式小笼的技艺带到常州并加以改良，形成了独特的常州风味。","shop":"迎桂馒头店（常州市钟楼区南大街双桂坊58号）","compare":"【汤汁】鸡汤皮冻调馅，鲜味足足的<br>【收口】至少14个褶子，少一个都不行<br>【吃法】轻轻提慢慢移，先开窗后喝汤再吃肉<br>【口感】皮薄汤多超鲜美，一口一个停不下来，常州人的早餐记忆"}],"新北区":[{"name":"常德糟扣肉","tags":["新北名菜","传统"],"brief":"酒糟烹制，肥而不腻","desc":"糟扣肉选用五花肉，用酒糟烹制，色泽红亮，肥而不腻。","story":"糟扣肉是常州'十大碗'宴席菜之一，相传源于明代。选用本地糯米酒糟，经三蒸三凉工序，成菜糟香扑鼻，肉质酥烂，是常武地区婚丧嫁娶宴席的必备菜。","shop":"常德糟扣肉老店（常州市新北区龙虎塘街道龙栖路88号）","compare":"【工艺】糯米酒糟来烹制，这是独门手艺<br>【口感】肥肉不腻瘦肉不柴，糟香扑鼻超开胃<br>【用途】婚丧嫁娶宴席必须有，图个好彩头<br>【口感】糟香浓郁入口即化，吃一块满嘴香，配饭超绝"}],"武进区":[{"name":"焦溪二花脸肉圆","tags":["武进名菜","非遗"],"brief":"手工制作，肥而不腻","desc":"二花脸猪是常州焦溪特产，肉质细腻。肉圆选用五花肉，手工打至上劲，蒸制而成。","story":"焦溪二花脸猪是400年前的传统猪种，因额头皱纹似'二'字而得名。2014年被列入国家级畜禽遗传资源保护名录。用二花脸猪肉做成的肉圆，肥而不腻，口感细腻，是常州宴席上的必备菜。","shop":"焦溪古镇农家乐（常州市武进区焦溪镇中街68号）","compare":"【猪种】二花脸猪是400年前的老品种，现在很少见了<br>【工艺】手工打至上劲，蒸出来才够弹<br>【特点】肥肉香瘦肉嫩，入口即化不油腻<br>【口感】QQ弹弹超有嚼劲，猪肉香混着鲜甜，老人小孩都爱吃"}],"金坛区":[{"name":"金坛标米封缸酒","tags":["金坛特产","非遗"],"brief":"糯米酿制，醇厚甘甜","desc":"封缸酒选用金坛优质糯米，经传统工艺自然发酵，色泽琥珀，醇厚甘甜。","story":"金坛封缸酒始于秦代，相传秦始皇东巡时曾品尝此酒，赞其'琼浆玉液'。选用金坛特有的'标米'（早白粳）酿制，需封缸发酵三年以上方可开坛，故名'封缸酒'。","shop":"金坛封缸酒厂直销店（常州市金坛区东门大街188号）","compare":"【选料】金坛特有的标米，早白粳品种才够好<br>【工艺】封缸发酵三年以上，时间短了不出味<br>【历史】秦代就开始做了，还当过贡品<br>【口感】酒香醇厚甘甜，冬天温一壶暖身暖胃，绝了"}],"溧阳市":[{"name":"天目湖砂锅鱼头","tags":["溧阳名片","必吃"],"brief":"汤白如乳，鲜而不腥","desc":"天目湖砂锅鱼头选用天目湖中天然生长的鳙鱼头，用天目湖水文火久煨，汤色乳白如汁、口感鲜而不腥。","story":"天目湖砂锅鱼头是溧阳的招牌菜，1970年代由天目湖宾馆厨师朱顺才创制。著名数学家华罗庚曾多次回乡品尝，赞不绝口。选用5-8斤重的野生鳙鱼头，用文火慢炖3小时以上，汤汁如牛奶般丝滑。","shop":"天目湖宾馆（常州市溧阳市天目湖旅游度假区环湖西路1号）","compare":"【选鱼】5到8斤重的野生鳙鱼头，鱼头越大越好<br>【水源】天目湖水文火久煨，水好汤才鲜<br>【特点】汤白如乳鲜而不腥，一锅能鲜掉眉毛<br>【口感】鱼头肉嫩汤鲜到飞起，砂锅炖的更入味，汤我能喝三碗"},{"name":"溧阳扎肝","tags":["溧阳三宝","非遗"],"brief":"食材丰富，香味浓郁","desc":"扎肝是溧阳传统美食，用小肠把猪肝、五花肉、油豆腐、笋干紧紧捆扎，浓油赤酱地慢炖。","story":"扎肝是溧阳'三宝'之一（肉圆、酱剥子、扎肝），相传源于明代。当地人办喜事时必备此菜，取'官运亨通、事业发达'的吉祥寓意。《舌尖上的中国》第二季曾专门介绍过这道美食。","shop":"溧阳各大菜馆（推荐：溧阳市南大街98号）","compare":"【工艺】小肠把猪肝五花肉油豆腐笋干捆一块儿<br>【炖煮】浓油赤酱慢炖，炖到软烂入味<br>【寓意】名字图个好彩头，官运亨通事业发达<br>【口感】一口吃到好几种食材，层次丰富超满足，肉香豆香笋香全齐了"},{"name":"雁来蕈豆腐煲","tags":["时令山珍","秋季限定"],"brief":"野生菌菇，鲜香四溢","desc":"雁来蕈是深秋野生菌，只在每年大雁南飞时产于茅山地区。配豆腐慢炖，鲜香无比。","story":"雁来蕈生长于深秋大雁归来之际，盛产于溧阳北部瓦屋山区。相传乾隆皇帝下江南时曾在茅山品尝此菜，赞其'山珍之冠'。雁来蕈无法人工培育，采摘期仅两周左右，极为珍贵。","shop":"瓦屋山农家乐（常州市溧阳市竹箦镇瓦屋山风景区）","compare":"【食材】深秋的野生菌，大雁南飞时才有的季节限定<br>【产地】茅山地区的特产，山里采的才正宗<br>【特点】无法人工培育，采摘期只有两周，错过等明年<br>【口感】菌香浓郁超鲜美，豆腐吸满汤汁超嫩滑，山珍的味道就是不一样"}],"代表面食":[{"name":"银丝面","tags":["常州代表面食","非遗"],"brief":"面细如银丝，汤鲜面滑","desc":"银丝面是常州百年传统面食，面条细如银丝、色白似雪。关键在于用食碱和鸡蛋清和面，配上鸡清汤。面条在沸水中翻滚15秒即捞出，根根分明、丝丝缕缕。","story":"常州银丝面创始于清代，乾隆皇帝南巡时曾品尝此面，赞不绝口。面粉中加入鸡蛋清和食用碱，经过反复揉搓和擀压，形成独特的爽滑口感。著名数学家华罗庚曾赋诗赞美：'银丝一根面，故乡万缕情'。中国小吃谱收录此为经典。","shop":"常州银丝面馆（常州市天宁区麻巷公寓1号甲单元102室，天宁寺南大门斜对面）","compare":"【细度】面条细如银丝色白似雪，够细才入味<br>【和面】食碱鸡蛋清和面，面才够爽滑筋道<br>【火候】沸水翻滚15秒就捞，早了夹生过了糊<br>【口感】面细如丝滑入口，吸溜一口超满足，这就是常州人的面"}]}},"suzhou":{"name":"苏州","icon":"🏮","desc":"苏式风味，精致典雅","districts":{"姑苏区":[{"name":"松鼠桂鱼","tags":["苏帮菜代表作","必吃"],"brief":"外酥里嫩，酸甜可口","desc":"松鼠桂鱼是苏帮菜的代表作，选用鳜鱼花刀炸制后淋上糖醋汁，形似松鼠，外酥里嫩。","story":"松鼠桂鱼源于乾隆下江南的典故。相传乾隆皇帝在松鹤楼品尝鳜鱼时，厨师为了讨彩头，将鱼身切成松鼠状，淋上糖醋汁。乾隆大悦，赐名'松鼠桂鱼'。如今已是苏帮菜的代表，逢年过节必备。","shop":"松鹤楼（苏州市姑苏区太监弄72号，近观前街）","compare":"【选料】鲜活太湖鳜鱼，约750克最佳，太大太小都不行<br>【刀工】鱼肉剞菱形花刀，深至鱼皮但不切断，这刀工了得<br>【酱汁】传统用冰糖镇江香醋调，酸甜适口<br>【口感】外酥里嫩酸甜开胃，菊花形状超好看，吃一口就爱上"},{"name":"响油鳝糊","tags":["苏帮名菜"],"brief":"滚油浇鳝，滋滋作响","desc":"响油鳝糊选用鳝鱼丝烹制，上桌时浇上滚烫的热油，滋滋作响，故名'响油'。","story":"响油鳝糊是苏州宴席上的经典菜肴，体现了苏帮菜讲究火候的特点。相传此菜源于清代，相传乾隆皇帝在苏州品尝后赞不绝口。制作时需将滚油浇在鳝丝上，瞬间激发葱姜蒜的香气。","shop":"得月楼（苏州市姑苏区临顿路182号，近观前街）","compare":"【选料】用鳝鱼丝现烹，新鲜才够嫩<br>【工艺】滚油浇上去滋滋作响，香味瞬间激发<br>【特点】蒜香浓郁滑嫩入味，苏帮菜经典<br>【口感】鳝丝软滑蒜香扑鼻，热油一浇鲜味全出来了"},{"name":"苏式糕团","tags":["苏州名点"],"brief":"做工精细，色彩绚丽","desc":"苏式糕团是苏州传统点心，选用糯米粉和粳米粉配合，染上天然色素，制成各种形状和颜色。","story":"苏州糕团源于宋代，已有千年历史。苏州人讲究'不时不食'，每个节气都有对应的糕团：新年吃年糕、清明吃青团、端午吃粽子、中秋吃月饼等。糕团不仅是美食，更是苏州人生活仪式感的体现。","shop":"万福兴（苏州市姑苏区东中市12号）","compare":"【原料】糯米粳米按季节调配，什么季节吃什么东西<br>【染色】天然植物汁液染色，安全又好看<br>【讲究】不时不食，每个节气都有对应的糕团<br>【口感】软糯香甜花样多，好看又好吃，苏州人的精致全在这了"}],"吴中区":[{"name":"东山白切羊肉","tags":["东山特产","冬季美食"],"brief":"皮白肉嫩，酥而不烂","desc":"东山白切羊肉选用东山地区放养的山羊，用传统白切工艺制作，保持羊肉原味。","story":"东山镇是苏州著名的羊肉产地，每年入秋后，当地人会吃羊肉进补。东山白切羊肉选用东山特有的湖羊，肉质细嫩，无腥膻味。配上本店特制的椒盐，是苏州人冬日里的温暖记忆。","shop":"东山白切羊肉老店（苏州市吴中区东山镇莫厘路98号）","compare":"【羊种】东山特有的湖羊，肉质细嫩没膻味<br>【特点】白切做法最大程度保留了羊肉的鲜<br>【吃法】配椒盐吃，冬天进补就靠它<br>【口感】肉质细嫩不膻，入口即化，配椒盐鲜香加倍"}],"相城区":[{"name":"阳澄湖大闸蟹","tags":["地理标志","时令"],"brief":"青壳白肚，金爪黄毛","desc":"阳澄湖大闸蟹是江苏著名特产，蟹黄饱满，蟹膏肥美，被誉为'蟹中之王'。","story":"阳澄湖大闸蟹养殖历史超过两千年。相传古代有一位考生在阳澄湖畔苦读，螃蟹成全了他的学业，因此螃蟹被赋予'解元'的谐音，成为科举时代的吉祥物。真正品蟹的最佳时间是农历九月团脐十月尖（雌蟹黄满雄蟹膏肥）。","shop":"阳澄湖旅游度假区各蟹庄（苏州市相城区阳澄湖生态休闲旅游度假区）","compare":"【标志】青壳白肚金爪黄毛，一眼就能认出来<br>【水质】阳澄湖水清澈偏碱性，蟹壳薄肉更鲜<br>【文化】鲁迅都夸好吃，名气不是盖的<br>【口感】蟹肉鲜甜弹牙，蟹黄饱满醇香，清蒸最能吃出本味"}],"昆山市":[{"name":"奥灶面","tags":["昆山代表","非遗"],"brief":"红油白汤，浇头丰富","desc":"奥灶面是昆山的招牌面食，汤底分为红油和白汤两种，配上各种浇头。","story":"奥灶面源于清咸丰年间，相传有一女子陈秀英在昆山半山桥开了一家小面馆，因面容丑陋被称为'奥灶'（昆山方言，意为丑陋）。但她做的面鲜美无比，后被称为'奥灶面'。2013年被评为中国十大面条之一。汤底用青鱼鳞、鱼鳃、螺蛳等熬制，鲜美无比。","shop":"奥面馆（苏州市昆山市人民路96号，半山桥旁）","compare":"【汤底】青鱼鳞鱼鳃螺蛳一起熬，这汤底绝了<br>【红油】秘制红油是灵魂，没有这油就不对味<br>【浇头】爆鱼用青鱼，鱼要够鲜才好吃<br>【口感】面条劲道汤头鲜，红油一拌香到流口水，苏式面的天花板"}],"常熟市":[{"name":"常熟蒸菜","tags":["常熟名菜","传统"],"brief":"原汁原味，蒸制讲究","desc":"常熟蒸菜以蒸制为主，保留食材原味。代表菜有母油船鸭、清蒸鲥鱼等。","story":"常熟蒸菜源于明代，相传是明代首辅严嵩的家厨所创。常熟人讲究'大蒸笼蒸一切'，不同的菜放在不同的蒸格中，用猛火蒸制。菜品讲究'三油'——素油拌、猪油配、麻油浇。","shop":"常熟老字号蒸菜馆（苏州市常熟市虞山街道县南街68号）","compare":"【工艺】大蒸笼蒸一切，蒸的功夫最重要<br>【特点】原汁原味猛火蒸，蒸出食材本来的味道<br>【讲究】三油——素油拌猪油配麻油浇，缺一不可<br>【口感】蒸出来的鲜嫩，原汁原味超健康，食材本身的味道"}],"张家港市":[{"name":"凤凰豆腐","tags":["凤凰特产"],"brief":"手工豆腐，细嫩鲜美","desc":"凤凰豆腐选用凤凰山泉水和本地黄豆，手工点制而成，口感细腻豆香浓郁。","story":"凤凰镇是苏州最北端的古镇，有'金凤凰'的美誉。当地水质清澈，适合制作豆腐。凤凰豆腐历史悠久，相传清代乾隆皇帝南巡时曾品尝此豆腐，赞其'细腻如玉'。","shop":"凤凰豆腐坊（苏州市张家港市凤凰镇凤凰路88号）","compare":"【水源】凤凰山泉水点豆腐，水好豆腐才嫩<br>【原料】本地黄豆，品质有保证<br>【历史】清代乾隆皇帝吃了都说好，名气传了几百年<br>【口感】豆腐嫩滑豆香浓，泉水点的就是不一样"}],"代表面食":[{"name":"苏式面","tags":["苏州代表面食","必吃"],"brief":"浇头丰富，头汤最鲜","desc":"苏式面是苏州人的日常，浇头是灵魂：爆鱼面、焖肉面、奥灶面、卤鸭面...一碗面能吃出百般花样。苏州人讲究'头汤面'——清晨第一锅水下的面，最是爽滑。","story":"苏州人吃面有讲究，要吃头汤面，要配焖肉浇头。陆文夫在《美食家》中写道：'苏州人的早晨，是从一碗面开始的。'朱鸿兴、同得兴、裕兴记等老字号承载着几代苏州人的味觉记忆。焖肉面是检验面馆水准的标准——肉要炖到入口即化却不散。'","shop":"同得兴精品面馆（苏州市姑苏区双塔街道十全街624号，十全街与凤凰街交叉口西北角）","compare":"【头汤】清晨第一锅水下 面，最爽滑<br>【浇头】焖肉爆鱼卤鸭可选，每样都诱人<br>【讲究】面要配浇头，焖肉要入口即化才行<br>【口感】头汤面爽滑劲道，浇头鲜美超满足，苏州人的一碗面"}],"美食对比":[{"name":"熏鱼 vs 爆鱼","compare":"【爆鱼】青鱼草鱼都行，酱油腌制后高温油炸，外酥里嫩，甜卤汁是灵魂<br>【熏鱼】做法更复杂，炸完还要用糖香料熏，带独特的烟熏香<br>【简单说】爆鱼是炸加卤，熏鱼是炸加熏，口感味道各有千秋<br>【口感】爆鱼外酥里嫩甜口，熏鱼韧劲足烟熏香浓，都是下酒神器","desc":"熏鱼和爆鱼都是苏州常见的鱼类小食，但制作工艺不同：<br><br>【爆鱼】选用青鱼或草鱼，切块后用酱油腌制，再入油锅炸至外酥里嫩。爆鱼的关键是'爆'——高温短时间油炸，使鱼肉迅速定型。成品外皮酥脆，内里保持鱼肉的嫩度。甜的卤汁是关键，吃起来甜中带鲜。<br><br>【熏鱼】制作更复杂，需要用糖和多种香料熏制，使鱼块带有独特的烟熏香气。熏鱼口感更韧，有嚼劲，风味更浓郁。<br><br>简单说：爆鱼是炸+卤，熏鱼是炸+熏。两者都是苏州人喜爱的佐酒佳品。逢年过节，家家户户都会炸上几盘爆鱼备用。","story":"苏州人的餐桌上，爆鱼和熏鱼都是常客。相传清代苏州厨师为了保存鲜鱼，发明了这种油炸后浸泡保存的方法。"}]}},"nantong":{"name":"南通","icon":"🌊","desc":"江海之会，鱼鲜之乡","districts":{"崇川区":[{"name":"南通脆鳝","tags":["南通名菜","传统"],"brief":"两次油炸，酥脆甜香","desc":"南通脆鳝选用鳝鱼经两次高温油炸，外皮酥到簌簌掉渣，裹着甜香酱汁。","story":"南通脆鳝是老南通餐桌上的硬菜，相传始于清代。选用新鲜黄鳝，经两次油炸使外皮形成酥脆的孔洞结构，再裹上特制糖醋汁。这道菜体现了南通人对食材的精雕细琢。","shop":"南通大饭店中餐厅（南通市崇川区青年中路79号）","compare":"【选材】用新鲜黄鳝，现划现做才够嫩<br>【工艺】两次高温油炸，炸出金黄酥脆的外皮<br>【特点】外皮酥脆里面嫩，裹上甜香酱汁超好吃<br>【口感】酥脆外壳包裹软嫩鳝肉，甜咸适中超开胃"},{"name":"白汁鮰鱼","tags":["长江三鲜","名菜"],"brief":"奶白浓汤，鲜而不腥","desc":"白汁鮰鱼是长江三鲜之一，不添半点酱油，文火慢煨出奶白浓汤，鱼肉细嫩。","story":"鮰鱼是长江特有的鱼类，肉质细嫩鲜美。清蒸鮰鱼始于宋代，相传苏东坡曾写诗赞美此鱼。'鮰鱼'与'回游'谐音，寓意美好，是南通人宴席上的必备菜。","shop":"南通大饭店（南通市崇川区青年中路79号）","compare":"【产地】长江三鲜之一，名气响当当<br>【工艺】文火慢煨，煨到汤变奶白色<br>【特点】不添酱油保持原色，鲜而不腥才地道<br>【口感】鱼肉细嫩无小刺，汤白如乳超鲜美，长江的味道"}],"通州区":[{"name":"石港窨糕","tags":["通州特产","季节限定"],"brief":"百年手艺，豆沙绵密","desc":"石港窨糕是南通传统糕点，选用优质糯米和红豆馅制成，有豆沙馅和薄荷馅两种口味。","story":"石港窨糕始于清光绪年间，已有百年历史。因石港古镇水质独特，制作出的糕点格外软糯。每年春季限定供应，是南通人春日必吃的时令美味。","shop":"石港老字号糕团店（南通市通州区石港镇广济桥路58号）","compare":"【工艺】传统工艺制作，一块糕有讲究<br>【口感】香甜软糯入口即化，米的香甜超好吃<br>【历史】地方传统糕点，老南通人的记忆<br>【口感】软糯香甜不腻口，老人小孩都能吃"},{"name":"西亭脆饼","tags":["通州特产","非遗"],"brief":"薄如纸片，十八层酥","desc":"西亭脆饼始创于清光绪年间，薄如纸片，层层叠叠达十八层，入口清脆声声入耳。","story":"西亭脆饼是南通著名特产，相传是西亭镇一位糕点师傅所创。他将面团反复擀压，终于制出薄如蝉翼、层次分明的脆饼。2013年被评为江苏省非物质文化遗产。","shop":"西亭脆饼老店（南通市通州区西亭镇中心街38号）","compare":"【工艺】传统工艺制作，层层起酥<br>【特点】酥脆可口，一碰就掉渣<br>【历史】南通特产，老字号的味道<br>【口感】薄脆酥香越嚼越甜，当零食超棒"}],"海门区":[{"name":"海门提汤羊肉","tags":["海门特产","非遗"],"brief":"省级非遗，秋冬暖锅","desc":"海门提汤羊肉选用本地白山羊慢炖至肉烂脱骨，汤色清亮，毫无膻味。","story":"海门提汤羊肉是省级非物质文化遗产，源于清代。当地人讲究秋冬进补，羊肉是首选。海门山羊是优良品种，肉质细嫩。制作时需用文火慢炖数小时，使羊肉酥烂入味。","shop":"海门羊肉馆（南通市海门区解放路268号）","compare":"【选羊】海门山羊，品种纯正肉质好<br>【工艺】传统白切做法，最大保留羊肉鲜<br>【特点】肉质细嫩，一点膻味都没有<br>【口感】白切最能吃出羊肉的鲜，嫩滑入味超好吃"},{"name":"红烧海 // ==================== 渲染函数 ====================
function renderFoodData() {
    const container = document.getElementById('food-content');
    container.innerHTML = '';
    
    Object.entries(foodData).forEach(([cityKey, cityData]) => {
        const citySection = document.createElement('section');
        citySection.className = `city-section city-${cityKey}`;
        citySection.setAttribute('data-city', cityKey);
        
        // 城市头部
        const header = document.createElement('div');
        header.className = 'city-header';
        header.innerHTML = `
            <span class="city-icon">${cityData.icon}</span>
            <div>
                <h2>${cityData.name}</h2>
                <div class="city-desc">${cityData.desc}</div>
            </div>
        `;
        citySection.appendChild(header);
        
        // 遍历各区县
        Object.entries(cityData.districts).forEach(([districtName, foods]) => {
            // 跳过空数组
            if (!foods || foods.length === 0) return;
            
            const districtDiv = document.createElement('div');
            districtDiv.className = 'district-section';
            
            // 检查是否是美食对比
            const isCompareSection = districtName === "美食对比";
            
            if (isCompareSection) {
                // 美食对比部分
                const compareTitle = document.createElement('div');
                compareTitle.className = 'district-title';
                compareTitle.textContent = '📚 美食对比';
                districtDiv.appendChild(compareTitle);
                
                foods.forEach((food) => {
                    const compareBox = document.createElement('div');
                    compareBox.className = 'compare-box';
                    
                    const title = document.createElement('div');
                    title.className = 'compare-title';
                    title.textContent = `🍽️ ${food.name}`;
                    compareBox.appendChild(title);
                    
                    const content = document.createElement('div');
                    content.className = 'compare-content';
                    content.innerHTML = food.desc.replace(/<br>/g, '<br>').replace(/【([^】]+)】/g, '<strong>$1</strong>：');
                    compareBox.appendChild(content);
                    
                    districtDiv.appendChild(compareBox);
                });
            } else {
                // 正常区县
                const districtTitle = document.createElement('div');
                districtTitle.className = 'district-title';
                districtTitle.textContent = districtName;
                districtDiv.appendChild(districtTitle);
                
                const foodGrid = document.createElement('div');
                foodGrid.className = 'food-grid';
                
                foods.forEach((food, index) => {
                    const card = document.createElement('div');
                    card.className = 'food-card';
                    card.style.animationDelay = `${index * 0.1}s`;
                    card.onclick = () => openModal(food, cityData.name, districtName);
                    
                    const tags = food.tags.slice(0, 2).map(tag => 
                        `<span class="food-tag">${tag}</span>`
                    ).join('');
                    
                    // 构建卡片内容
                    let cardHTML = '';
                    
                    // 如果有图片，添加图片
                    if (food.image) {
                        cardHTML += `<img class="food-card-image" src="${food.image}" alt="${food.name}" loading="lazy">`;
                    }
                    
                    cardHTML += `
                        <div class="food-card-header">
                            <div class="food-name">${food.name}</div>
                            <div class="food-tags">${tags}</div>
                        </div>
                        <div class="food-card-body">
                            <div class="food-brief">${food.brief}</div>
                            <div class="food-footer">
                                <span class="food-detail-btn">查看详情</span>
                            </div>
                        </div>
                    `;
                    
                    card.innerHTML = cardHTML;
                    
                    foodGrid.appendChild(card);
                });
                
                districtDiv.appendChild(foodGrid);
            }
            
            citySection.appendChild(districtDiv);
        });
        
        container.appendChild(citySection);
    });
}

// ==================== 模态窗口 ====================
function openModal(food, cityName, districtName) {
    document.getElementById('modal-title').textContent = food.name;
    document.getElementById('modal-location').textContent = cityName + ' · ' + districtName;
    document.getElementById('modal-desc').textContent = food.desc;
    
    var storySection = document.getElementById('story-section');
    var storyContent = document.getElementById('modal-story');
    if (food.story) {
        storySection.classList.remove('hidden');
        storyContent.innerHTML = formatContent(food.story);
    } else {
        storySection.classList.add('hidden');
    }
    
    // 处理"讲究在哪"板块
    var compareSection = document.getElementById('compare-section');
    var compareContent = document.getElementById('modal-compare');
    if (food.compare) {
        compareSection.style.display = 'block';
        compareContent.innerHTML = formatContent(food.compare);
    } else {
        compareSection.style.display = 'none';
    }
    
    var shopSection = document.getElementById('shop-section');
    var shopContent = document.getElementById('modal-shop');
    if (food.shops && food.shops.length > 0) {
        shopSection.classList.remove('hidden');
        var shopListHtml = food.shops.map(function(s) {
            var addr = s.replace(/^[^（（]+[（（]/, '').replace(/[）)][:：]/g, '').replace(/[）)]$/, '');
            var mapUrl = 'https://uri.amap.com/search?keyword=' + encodeURIComponent(s);
            return '<div class="shop-item"><a href="' + mapUrl + '" target="_blank" rel="noopener" class="shop-link">📍 ' + s + '</a></div>';
        }).join('');
        shopContent.innerHTML = shopListHtml;
    } else if (food.shop) {
        var mapUrl2 = 'https://uri.amap.com/search?keyword=' + encodeURIComponent(food.shop);
        shopSection.classList.remove('hidden');
        shopContent.innerHTML = '<div class="shop-item"><a href="' + mapUrl2 + '" target="_blank" rel="noopener" class="shop-link">📍 ' + food.shop + '</a></div>';
    } else {
        shopSection.classList.add('hidden');
    }
    
    // Reset scroll and tabs
    var modalBody = document.querySelector('.modal-body');
    if (modalBody) modalBody.scrollTop = 0;
    
    document.getElementById('modal').classList.add('show');
    document.body.style.overflow = 'hidden';
    
    // Bind tab navigation
    bindModalTabs();
}

function formatContent(text) {
    if (!text) return '';
    return text.split('<br>').filter(function(t) { return t.trim(); }).map(function(t) { 
        return '<p style="margin-bottom:10px">' + t + '</p>'; 
    }).join('');
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
    document.body.style.overflow = '';
}

// 绑定导航tab点击事件
function bindModalTabs() {
    document.querySelectorAll('.modal-tab').forEach(function(tab) {
        tab.onclick = function() {
            var targetId = this.getAttribute('data-target');
            var targetSection = document.getElementById(targetId);
            if (targetSection) {
                var modalBodyEl2 = document.querySelector('.modal-body');
                if (modalBodyEl2 && targetSection) {
                    modalBodyEl2.scrollTo({ top: targetSection.offsetTop - modalBodyEl2.offsetTop - 50, behavior: 'smooth' });
                }
            }
            // 更新高亮
            document.querySelectorAll('.modal-tab').forEach(function(t) {
                t.classList.remove('active');
            });
            this.classList.add('active');
        };
    });
    
    // 监听滚动，更新tab高亮
    var modalBodyEl = document.querySelector('.modal-body');
    var sections = ['desc-section', 'story-section', 'compare-section', 'shop-section'];
    
    if (modalBodyEl) {
    modalBodyEl.onscroll = function() {
        var scrollPos = modalBody.scrollTop;
        var activeTab = 'desc-section';
        
        sections.forEach(function(sectionId) {
            var section = document.getElementById(sectionId);
            if (section && section.offsetTop <= scrollPos + 100) {
                activeTab = sectionId;
            }
        });
        
        document.querySelectorAll('.modal-tab').forEach(function(tab) {
            tab.classList.toggle('active', tab.getAttribute('data-target') === activeTab);
        });
    };
    }

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

// ==================== 筛选功能 ====================
document.querySelectorAll('.nav-list button').forEach(btn => {
    btn.addEventListener('click', function() {
        const city = this.getAttribute('data-city');
        document.querySelectorAll('.nav-list button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        document.querySelectorAll('.city-section').forEach(section => {
            const sectionCity = section.getAttribute('data-city');
            if (city === 'all') {
                section.classList.remove('hidden');
            } else {
                section.classList.toggle('hidden', sectionCity !== city);
            }
        });
        
        // 滚动到对应城市内容区域
        if (city === 'all') {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            const targetSection = document.querySelector(`.city-section[data-city="${city}"]`);
            if (targetSection) {
                const navHeight = document.querySelector('.nav-bar').offsetHeight;
                const targetTop = targetSection.getBoundingClientRect().top + window.pageYOffset - navHeight - 20;
                window.scrollTo({ top: targetTop, behavior: 'smooth' });
            }
        }
    });
});

})();
